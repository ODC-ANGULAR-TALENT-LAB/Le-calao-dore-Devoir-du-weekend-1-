<section
  id="accueil"
  class="hero"
  [style.background-image]="'url(' + backgroundImage + ')'">

  <!-- Overlay sombre semi-transparent pour la lisibilité du texte -->
  <div class="overlay"></div>

  <div class="content reveal">
    <span class="hero-badge">Restaurant camerounais · Akwa, Douala</span>

    <h1 class="hero-title">{{ title }}</h1>
    <p class="hero-subtitle">{{ subtitle }}</p>

    <div class="hero-actions">
      <a href="#menu" class="btn btn-lg btn-calao">Voir le menu</a>
      <a href="#contact" class="btn btn-lg btn-outline-light hero-btn-ghost">Nous trouver</a>
    </div>

    <!-- Chiffres clés -->
    <ul class="hero-stats">
      @for (stat of stats; track stat.label) {
        <li>
          <span class="stat-value">{{ stat.value }}</span>
          <span class="stat-label">{{ stat.label }}</span>
        </li>
      }
    </ul>
  </div>

  <!-- Indicateur de défilement -->
  <a href="#menu" class="scroll-hint" aria-label="Faire défiler vers le menu">
    <span></span>
  </a>
</section>
